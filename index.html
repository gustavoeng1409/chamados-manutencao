<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Chamados · Manutenção</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --or:#E05A1E;--or2:#C44D18;--or-bg:#FFF4EE;--or-border:#FDBA8C;
  --bg:#F2F1ED;--card:#FFFFFF;--surface2:#F8F7F4;--border:#E4E2DC;--border2:#CCC9C2;
  --text:#18171A;--text2:#5C5A58;--text3:#9B9895;
  --green:#0D7D4D;--green-bg:#ECFDF5;--green-bd:#86EFAC;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-bd:#93C5FD;
  --amber:#92400E;--amber-bg:#FFFBEB;--amber-bd:#FDE68A;
  --red:#B91C1C;
  --r:14px;--rsm:10px;--rxs:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Courier New',monospace;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shmd:0 4px 12px rgba(0,0,0,.08);
}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--text);}

/* LOGIN */
#pg-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;z-index:1;}
.login-wrap{width:100%;max-width:380px;}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;}
.login-icon{width:44px;height:44px;background:var(--or);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-brand-name{font-size:18px;font-weight:700;}
.login-brand-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--shmd);}
.login-sec-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.login-sep{border:none;border-top:1px solid var(--border);margin:16px 0;}
.login-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface2);cursor:pointer;margin-bottom:8px;transition:border-color .15s,background .1s;}
.login-row:last-child{margin-bottom:0;}
.login-row:hover{border-color:var(--border2);background:#EEECEA;}
.login-row:active{transform:scale(.99);}
.login-row.adm{background:var(--or);border-color:var(--or);color:white;}
.login-row.adm:hover{background:var(--or2);}
.login-row.dashed{border-style:dashed;background:transparent;}
.lr-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.lr-av.adm{background:rgba(255,255,255,.2);color:white;font-size:18px;}
.lr-av.tec{background:var(--or-bg);color:var(--or);}
.lr-av.add{background:var(--bg);color:var(--text3);font-size:20px;}
.lr-text{flex:1;}
.lr-name{font-size:14px;font-weight:600;}
.lr-sub{font-size:11px;opacity:.7;margin-top:1px;}
.lr-arr{font-size:14px;opacity:.35;}

/* APP */
#pg-app{display:none;max-width:960px;margin:0 auto;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--or);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-av{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.tb-role{font-size:10px;opacity:.75;font-weight:600;letter-spacing:.05em;text-transform:uppercase;line-height:1;}
.tb-name{font-size:15px;font-weight:700;line-height:1.3;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-pill{background:rgba(255,255,255,.2);padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;}
.tb-exit{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:500;}

/* STATS */
.stat-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);}
.stat{flex:1;padding:10px 0;text-align:center;}
.stat+.stat{border-left:1px solid var(--border);}
.stat-num{font-size:22px;font-weight:700;line-height:1;}
.stat-num.or{color:var(--or);}
.stat-num.bl{color:var(--blue);}
.stat-num.gr{color:var(--green);}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

/* TABS */
.tabs{background:var(--card);display:flex;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:40;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;min-width:72px;}
.tab.active{color:var(--or);border-bottom-color:var(--or);font-weight:700;}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;}
.toolbar input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rxs);font-size:13px;background:var(--surface2);font-family:var(--font);color:var(--text);}
.toolbar input:focus{outline:none;border-color:var(--or-border);}

/* CONTENT */
.content{padding:14px 16px 90px;}
@media(min-width:640px){
  .content{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
  .content .empty,.content .full-width{grid-column:1/-1;}
}
@media(min-width:900px){
  .content{grid-template-columns:1fr 1fr 1fr;}
}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh);}
.card-stripe{height:4px;}
.card-stripe.aberto{background:var(--amber-bd);}
.card-stripe.cotacao{background:#C4B5FD;}
.card-stripe.andamento{background:var(--blue-bd);}
.card-stripe.encerrado{background:var(--green-bd);}
.card-body{padding:13px 14px;}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.card-os{font-family:var(--mono);font-size:11px;color:var(--text3);font-weight:600;}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;}
.badge.aberto{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.badge.andamento{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}
.badge.encerrado{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.badge.cotacao{background:#EDE9FE;color:#7C3AED;border:1px solid #C4B5FD;}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:5px;}
.prio-dot.alta{background:#EF4444;}
.prio-dot.media{background:#F59E0B;}
.prio-dot.baixa{background:#10B981;}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:10px;}

/* Campos do card */
.card-fields{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.card-field{display:flex;gap:6px;font-size:12px;color:var(--text2);align-items:baseline;}
.cf-label{color:var(--text3);font-weight:600;white-space:nowrap;min-width:72px;font-size:11px;}
.cf-value{color:var(--text);font-weight:500;word-break:break-word;}

.card-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.chip{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-weight:500;}
.chip.warn{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.chip.money{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}

.card-footer{display:flex;gap:6px;border-top:1px solid var(--border);padding-top:10px;}
.btn{flex:1;padding:8px 6px;border-radius:var(--rxs);border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:var(--font);}
.btn:hover{background:var(--surface2);}
.btn.primary{background:var(--or);color:white;border-color:var(--or);}
.btn.primary:hover{background:var(--or2);}
.btn.success{background:var(--green);color:white;border-color:var(--green);}
.btn.whats{background:#25D366;color:white;border-color:#25D366;}
.btn.ghost{background:transparent;color:var(--text3);}
.btn:active{opacity:.75;}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--or);color:white;font-size:22px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(224,90,30,.45);z-index:30;}
.fab:hover{background:var(--or2);}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty h3{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.empty p{font-size:13px;color:var(--text3);line-height:1.5;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:9999;}
@media(min-width:640px){.modal-overlay{align-items:center;}}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;}
@media(min-width:640px){.modal{border-radius:20px;}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
@media(min-width:640px){.modal-handle{display:none;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:700;}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--text3);display:flex;align-items:center;justify-content:center;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);font-size:14px;color:var(--text);font-family:var(--font);-webkit-appearance:none;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--or-border);background:white;}
.field textarea{min-height:78px;resize:vertical;line-height:1.5;}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px;}
.info-box{background:var(--or-bg);border:1px solid var(--or-border);border-radius:var(--rxs);padding:10px 13px;margin-bottom:14px;font-size:13px;color:var(--or2);line-height:1.5;}
.detail-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:13px;margin-bottom:12px;}
.detail-block .sec{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row:last-child{border-bottom:none;padding-bottom:0;}
.dl{color:var(--text3);flex-shrink:0;padding-right:10px;font-size:12px;font-weight:500;}
.dv{font-weight:600;color:var(--text);text-align:right;max-width:65%;word-break:break-word;}
.photo-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.photo-thumb{width:72px;height:72px;border-radius:var(--rxs);object-fit:cover;border:1px solid var(--border);cursor:pointer;}
.photo-add{width:72px;height:72px;border-radius:var(--rxs);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;color:var(--text3);cursor:pointer;background:var(--surface2);}
.photo-add span{font-size:9px;font-weight:600;margin-top:2px;}
.prio-row{display:flex;gap:8px;}
.prio-opt{flex:1;padding:9px 4px;border-radius:var(--rxs);border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:var(--text2);}
.prio-opt.sel.alta{background:#FEE2E2;color:var(--red);border-color:#FCA5A5;}
.prio-opt.sel.media{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.prio-opt.sel.baixa{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.tec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.tec-av{width:40px;height:40px;border-radius:50%;background:var(--or-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--or);flex-shrink:0;}
.tec-info{flex:1;}
.tec-name{font-size:14px;font-weight:600;}
.tec-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.tec-acts{display:flex;gap:5px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-sep{border:none;border-top:1px solid var(--border);margin:14px 0;}
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;white-space:nowrap;max-width:94vw;text-align:center;box-shadow:var(--shmd);pointer-events:none;}
.btn-aprovar{width:32px;height:32px;border-radius:8px;border:none;background:#0D7D4D;color:white;font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.btn-reprovar{width:32px;height:32px;border-radius:8px;border:none;background:#B91C1C;color:white;font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.btn-reabrir{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);border-radius:var(--rxs);padding:4px 8px;font-size:11px;cursor:pointer;font-family:var(--font);}
</style>
<script>
function mostrarSenha(){
  document.getElementById('senha-box').style.display='block';
  document.getElementById('btn-adm').style.display='none';
  setTimeout(function(){ var s=document.getElementById('f-senha-inline'); if(s) s.focus(); },100);
}
function esconderSenha(){
  document.getElementById('senha-box').style.display='none';
  document.getElementById('btn-adm').style.display='flex';
  document.getElementById('senha-erro').style.display='none';
  document.getElementById('f-senha-inline').value='';
}
function confirmarSenha(){
  var s=document.getElementById('f-senha-inline');
  if(!s) return;
  if(s.value==='manutencao2024'){
    // Mostra selecao de perfil de analista
    mostrarSelecaoPerfil();
  } else {
    s.value='';
    document.getElementById('senha-erro').style.display='block';
    setTimeout(function(){ document.getElementById('senha-erro').style.display='none'; },3000);
  }
}
function mostrarSelecaoPerfil(){
  var box=document.getElementById('senha-box');
  var html='<div style="font-size:11px;font-weight:700;color:#9B9895;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">Selecione seu perfil</div>';
  analistas.forEach(function(a,i){
    html+=
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'+
        '<div class="perfil-item" data-idx="'+i+'" style="flex:1;display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #E4E2DC;border-radius:10px;background:#F8F7F4;cursor:pointer;">'+
          '<div style="width:34px;height:34px;border-radius:50%;background:#E05A1E;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;">'+a.nome.charAt(0).toUpperCase()+'</div>'+
          '<span style="font-size:14px;font-weight:600;color:#18171A;">'+a.nome+'</span>'+
        '</div>'+
        '<div class="perfil-edit" data-idx="'+i+'" style="width:34px;height:34px;border:1px solid #E4E2DC;border-radius:8px;background:#F8F7F4;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;" title="Editar nome">&#9998;</div>'+
      '</div>';
  });
  html+=
    '<div id="btn-criar-perfil" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px dashed #CCC9C2;border-radius:10px;cursor:pointer;color:#9B9895;margin-top:4px;">'+
      '<div style="width:34px;height:34px;border-radius:50%;background:#F2F1ED;display:flex;align-items:center;justify-content:center;font-size:20px;">+</div>'+
      '<span style="font-size:13px;">Criar novo perfil</span>'+
    '</div>'+
    '<button id="btn-voltar-senha" style="width:100%;margin-top:10px;padding:8px;border:1px solid #E4E2DC;border-radius:10px;background:transparent;font-size:12px;cursor:pointer;color:#9B9895;font-family:inherit;">Voltar</button>';
  box.innerHTML=html;
  box.querySelectorAll('.perfil-item').forEach(function(el){
    el.addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-idx'));
      if(analistas[idx]) selecionarPerfil(analistas[idx].id);
    });
  });
  box.querySelectorAll('.perfil-edit').forEach(function(el){
    el.addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-idx'));
      if(analistas[idx]) mostrarEditarPerfil(idx);
    });
  });
  var btnCriar=document.getElementById('btn-criar-perfil');
  if(btnCriar) btnCriar.addEventListener('click', mostrarCriarPerfil);
  var btnVoltar=document.getElementById('btn-voltar-senha');
  if(btnVoltar) btnVoltar.addEventListener('click', voltarSenha);
}
function mostrarEditarPerfil(idx){
  var a=analistas[idx];
  if(!a) return;
  var box=document.getElementById('senha-box');
  box.innerHTML=
    '<div style="font-size:11px;font-weight:700;color:#9B9895;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">Editar perfil</div>'+
    '<input id="edit-perfil-nome" value="'+a.nome+'" style="width:100%;padding:10px 12px;border:1px solid #E4E2DC;border-radius:10px;font-size:14px;background:#F8F7F4;font-family:inherit;margin-bottom:8px;"/>'+
    '<div style="display:flex;gap:8px;">'+
      '<button id="btn-cancel-edit" style="flex:1;padding:10px;border:1px solid #E4E2DC;border-radius:10px;background:transparent;font-size:13px;cursor:pointer;font-family:inherit;">Cancelar</button>'+
      '<button id="btn-save-edit" style="flex:1;padding:10px;border:none;border-radius:10px;background:#E05A1E;color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Salvar</button>'+
    '</div>';
  setTimeout(function(){ var el=document.getElementById('edit-perfil-nome'); if(el){el.focus();el.select();} },100);
  document.getElementById('btn-cancel-edit').addEventListener('click', mostrarSelecaoPerfil);
  document.getElementById('btn-save-edit').addEventListener('click', function(){
    var inp=document.getElementById('edit-perfil-nome');
    if(!inp||!inp.value.trim()) return;
    analistas[idx].nome=inp.value.trim();
    if(typeof save==='function') save();
    mostrarSelecaoPerfil();
    if(typeof toast==='function') toast('Perfil atualizado!');
  });
}

function voltarSenha(){
  esconderSenha();
  mostrarSenha();
}
function mostrarCriarPerfil(){
  var box=document.getElementById('senha-box');
  box.innerHTML=
    '<div style="font-size:11px;font-weight:700;color:#9B9895;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">Novo perfil</div>'+
    '<input id="novo-perfil-nome" placeholder="Nome do analista" style="width:100%;padding:10px 12px;border:1px solid #E4E2DC;border-radius:10px;font-size:14px;background:#F8F7F4;font-family:inherit;margin-bottom:8px;"/>'+
    '<div style="display:flex;gap:8px;">'+
      '<button id="btn-cancel-criar" style="flex:1;padding:10px;border:1px solid #E4E2DC;border-radius:10px;background:transparent;font-size:13px;cursor:pointer;font-family:inherit;">Cancelar</button>'+
      '<button id="btn-confirmar-criar" style="flex:1;padding:10px;border:none;border-radius:10px;background:#E05A1E;color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Criar</button>'+
    '</div>';
  setTimeout(function(){ var el=document.getElementById('novo-perfil-nome'); if(el) el.focus(); },100);
  document.getElementById('btn-cancel-criar').addEventListener('click', mostrarSelecaoPerfil);
  document.getElementById('btn-confirmar-criar').addEventListener('click', criarPerfil);
}
function criarPerfil(){
  var inp=document.getElementById('novo-perfil-nome');
  if(!inp||!inp.value.trim()){ return; }
  var nome=inp.value.trim();
  analistas.push({id:'ADM-'+Date.now(),nome:nome});
  save();
  mostrarSelecaoPerfil();
  toast('Perfil "'+nome+'" criado!');
}
function selecionarPerfil(admId){
  var a=analistas.find(function(x){ return x.id===admId; });

var SUPA_HDR={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

function supaGet(table,eq){
  var url=SUPA_URL+'/rest/v1/'+table+'?select=*';
  if(eq) url+='&'+eq;
  return fetch(url,{headers:SUPA_HDR}).then(function(r){return r.json();});
}
function supaUpsert(table,obj){
  return fetch(SUPA_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:Object.assign({},SUPA_HDR,{'Prefer':'resolution=merge-duplicates'}),
    body:JSON.stringify(obj)
  });
}
function supaDelete(table,eq){
  return fetch(SUPA_URL+'/rest/v1/'+table+'?'+eq,{

function save(){
  _lastSaveTime=Date.now();
  if(_saving){ _saveQueue=true; return; }
  _saving=true;
  // Indicador visual de salvando
  var ind=document.getElementById('save-indicator');
  if(ind){ ind.style.display='flex'; ind.textContent='Salvando...'; ind.style.background='rgba(0,0,0,0.6)'; }
  var payload={
    chamados:chamados, tecnicos:tecnicos, nextId:nextId,
    statusDisponiveis:statusDisponiveis, analistas:analistas,
    _ts:Date.now()
  };
  function tentarSalvar(tentativa){
    supaUpsert('config',[{chave:'dados',valor:payload}])
      .then(function(r){
        _saving=false;
        _lastSaveConfirmed=Date.now();
        _tsServidor=payload._ts;
        // Confirma visualmente
        if(ind){
          ind.textContent='Salvo!';
          ind.style.background='rgba(13,125,77,0.85)';
          setTimeout(function(){ ind.style.display='none'; },2000);
        }
        if(_saveQueue){ _saveQueue=false; save(); }
      })
      .catch(function(e){
        if(tentativa<3){
          // Retry automatico
          setTimeout(function(){ tentarSalvar(tentativa+1); }, 2000);
          if(ind){ ind.textContent='Reconectando... ('+tentativa+'/3)'; ind.style.background='rgba(180,60,0,0.85)'; }
        } else {
          _saving=false;
          if(ind){
            ind.textContent='Erro ao salvar!';
            ind.style.background='rgba(185,28,28,0.85)';
            setTimeout(function(){ ind.style.display='none'; },4000);
          }
          toast('Erro ao salvar. Verifique sua conexao!');
          console.warn('Erro Supabase apos 3 tentativas:',e);
        }
      });
  }
  tentarSalvar(1);
}
var statusDisponiveis=['Aguardando peca','Aguardando visita','Em atendimento','Aguardando aprovacao'];

}

      }

    .catch(function(e){
      console.warn('Erro ao carregar Supabase:',e);

}

function reprovarCotacao(chamadoId,tecId){
  var ch=chamados.find(function(x){ return x.id===chamadoId; });
  if(!ch||!ch.cotacao) return;
  var ct=ch.cotacao.find(function(x){ return x.tecId===tecId; });
  if(ct) ct.status='reprovado';
  // Se todos reprovados, limpa cotacao
  var pendentes=ch.cotacao.filter(function(x){ return x.status==='pendente'; });
  if(!pendentes.length){
    ch.nomeTecnico='';
    ch.cotacao=null;
  }
  save();render();toast('Tecnico reprovado.');
}

// Helpers de status de chamado
function isCotacao(ch){ return !!(ch.cotacao && ch.cotacao.length); }
function isCotacaoTec(ch, tecId){
  return ch.cotacao && ch.cotacao.some(function(ct){ return ct.tecId===tecId && ct.status==='pendente'; });
}
function isAtribuidoDireto(ch, tecId){ return ch.tecnicoId===tecId && !ch._cotacaoOrigem; }
function isAprovadoCotacao(ch, tecId){ return ch.tecnicoId===tecId && ch._cotacaoOrigem; }
// Chamado visivel para tecnico (atribuido direto ou em cotacao pendente)
function visivelParaTec(ch, tecId){
  // Atribuido diretamente a este tecnico
  if(ch.tecnicoId===tecId && !isCotacao(ch)) return true;
  // Em cotacao pendente para este tecnico
  if(isCotacaoTec(ch, tecId)) return true;
  // Aprovado da cotacao para este tecnico (cotacao foi limpa, tecnicoId definido)
  if(ch.tecnicoId===tecId) return true;
  return false;
}
// Pendente para tecnico = nao assumido ainda (aberto) ou em cotacao pendente
function pendenteTec(ch, tecId){
  // Em cotacao pendente para ele - apenas status aberto
  if(isCotacaoTec(ch, tecId) && ch.status==='aberto') return true;
  // Atribuido direto mas ainda nao assumido (status aberto) e nao em cotacao
  if(ch.tecnicoId===tecId && ch.status==='aberto' && !isCotacao(ch)) return true;
  return false;
}

function meusChamados(list){
  if(currentRole==='adm' && currentAnalista){
    return list.filter(function(x){
      // Ve apenas chamados do seu perfil
      // Chamados sem analistaId: aparecem para TODOS (compatibilidade com dados antigos)
      // mas apenas enquanto houver menos de 2 analistas cadastrados
      if(!x.analistaId){
        // Se ha apenas 1 analista, todos os chamados sem ID sao dele
        if(analistas.length<=1) return true;
        // Se ha multiplos analistas, chamados sem ID sao "orfaos" - aparecem para todos
        return true;
      }
      return x.analistaId===currentAnalista.id;
    });
  }
  return list;
}

function getList(){
  var q=((document.getElementById('search-input')||{}).value||'').toLowerCase();
  var filtroTec=((document.getElementById('filtro-tec')||{}).value||'');
  var list=[...chamados];

  if(currentRole==='tecnico'){
    var tid=currentTecnico.id;
    list=list.filter(function(x){ return visivelParaTec(x,tid); });
    if(currentTab==='pend-tec'){
      list=list.filter(function(x){ return pendenteTec(x,tid); });
    } else if(currentTab==='and-tec'){
      list=list.filter(function(x){ return x.tecnicoId===tid && x.status==='andamento'; });
    } else if(currentTab==='enc-tec'){
      list=list.filter(function(x){ return x.tecnicoId===tid && x.status==='encerrado'; });
    } else if(currentTab==='nota'){
      list=list.filter(function(x){ return x.tecnicoId===tid && x.status==='encerrado'; });
    }
  } else {
    // ADM: primeiro filtra pelo analista logado
    list=meusChamados(list);
    // Depois filtra pela aba
    if(currentTab==='pendentes'){
      list=list.filter(function(x){
        if(x.status!=='aberto') return false;
        if(isCotacao(x)) return true;
        if(!x.tecnicoId) return true;
        return false;
      });
    } else if(currentTab==='aberto'){
      list=list.filter(function(x){
        return x.status==='aberto' && x.tecnicoId && !isCotacao(x);
      });
    } else if(currentTab==='andamento'){
      list=list.filter(function(x){
        return x.status==='andamento' && !isCotacao(x);
      });
    } else if(currentTab==='encerrado'){
      list=list.filter(function(x){ return x.status==='encerrado'; });
    }
    // Filtro por tecnico (opcional na toolbar)
    if(filtroTec){
      list=list.filter(function(x){ return x.tecnicoId===filtroTec; });
    }
  }

  if(q) list=list.filter(function(x){
    return (x.id||'').toLowerCase().indexOf(q)>=0||
      (x.titulo||'').toLowerCase().indexOf(q)>=0||
      (x.unidade||'').toLowerCase().indexOf(q)>=0||
      (x.equipamento||'').toLowerCase().indexOf(q)>=0||
      (x.nomeTecnico||'').toLowerCase().indexOf(q)>=0||
      (x.patrimonio||'').toLowerCase().indexOf(q)>=0;
  });
  var po={alta:0,media:1,baixa:2};
  list.sort(function(a,b){ return (po[a.prioridade||'media']||1)-(po[b.prioridade||'media']||1); });
  return list;
}

// RENDER
// ---
function mkBtn(cls,fn,args,txt){
  var q="'";
  var argsStr=args.map(function(a){return q+a+q;}).join(',');
  return '<button class="'+cls+'" onclick="'+fn+'('+argsStr+')">'+txt+'</button>';
}
// Icones padrao dos botoes
var ICONS={
  ver:'Ver detalhes',
  atribuir:'👷 Atribuir',
  trocar:'🔄 Trocar',
  whatsapp:'📱 WhatsApp',
  assumir:'✅ Assumir',
  encerrar:'🔒 Encerrar',
  propor:'📋 Ver e propor',
  aguardando:'⏳ Aguardando',
  aprovar:'✓',
  reprovar:'✗',
  reabrir:'↩ Reabrir'
};

function reivindicarOrfaos(){
  if(!currentAnalista) return;
  var count=0;
  chamados.forEach(function(ch){
    if(!ch.analistaId){
      ch.analistaId=currentAnalista.id;
      ch.analistaNome=currentAnalista.nome;
      count++;
    }
  });
  save();render();
  toast('✅ '+count+' chamado'+(count>1?'s atribuídos':'s atribuído')+' ao perfil '+currentAnalista.nome+'!');
}

function gerarBtnVer(id){
  return mkBtn('btn','openModal',['ver',id],ICONS.ver);
}
function gerarBtnTec(ch,isTec,tecPendente){
  if(!isTec||ch.status==='encerrado') return '';
  // Verifica se ja enviou proposta nesta cotacao
  if(tecPendente){
    var minhaCot=ch.cotacao&&ch.cotacao.find(function(ct){return ct.tecId===currentTecnico.id;});
    if(minhaCot&&minhaCot.proposta){
      return '<span style="font-size:11px;color:var(--amber);font-weight:600;padding:6px 10px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--rxs);">'+ICONS.aguardando+' Aguardando aprovacao</span>';
    }
    return mkBtn('btn primary','openModal',['atualizar',ch.id],ICONS.propor);
  }
  if(ch.tecnicoId===currentTecnico.id){
    if(ch.status==='aberto') return mkBtn('btn primary','openModal',['atualizar',ch.id],ICONS.assumir);
    return mkBtn('btn success','openModal',['atualizar',ch.id],ICONS.encerrar);
  }
  return '';
}
function gerarBtnAdm(ch,isAdm,emCot){
  if(!isAdm||ch.status==='encerrado') return '';
  if(ch.tecnicoId&&!emCot) return mkBtn('btn ghost','openModal',['atrib',ch.id],ICONS.trocar);
  return mkBtn('btn ghost','openModal',['atrib',ch.id],ICONS.atribuir);
}
function gerarBtnWhats(id){
  return mkBtn('btn whats','enviarWhats',[id],ICONS.whatsapp);
}

function render(){
  if(currentTab==='tecnicos'){renderTecnicos();return;}
  if(currentTab==='status-cfg'){renderStatusCfg();return;}
  if(currentTab==='nota'){renderNotaFiscal();return;}

  // Stats bar (somente ADM)
  var sb=document.getElementById('stat-bar');
  if(sb){
    var meus=meusChamados(chamados);
    var nPend=meus.filter(function(x){ return x.status==='aberto'&&(isCotacao(x)||!x.tecnicoId); }).length;
    var nAberto=meus.filter(function(x){ return x.status==='aberto'&&x.tecnicoId&&!isCotacao(x); }).length;
    var nAndamento=meus.filter(function(x){ return x.status==='andamento'&&!isCotacao(x); }).length;
    var nEncerrado=meus.filter(function(x){ return x.status==='encerrado'; }).length;
    sb.innerHTML=
      '<div class="stat"><div class="stat-num or">'+nPend+'</div><div class="stat-label">Pendentes</div></div>'+
      '<div class="stat"><div class="stat-num" style="color:#7C3AED;">'+nAberto+'</div><div class="stat-label">Abertos</div></div>'+
      '<div class="stat"><div class="stat-num bl">'+nAndamento+'</div><div class="stat-label">Andamento</div></div>'+
      '<div class="stat"><div class="stat-num gr">'+nEncerrado+'</div><div class="stat-label">Encerrados</div></div>';
  }

  // Counter = numero da aba atual
  var lista=getList();
  document.getElementById('counter').textContent=lista.length;

  // Toolbar com filtro por tecnico - reconstroi apenas quando necessario
  var toolbarEl=document.getElementById('toolbar-bar');
  var showFiltroTec=currentRole==='adm'&&['pendentes','aberto','andamento','encerrado'].indexOf(currentTab)>=0;
  var temFiltroTec=!!toolbarEl.querySelector('#filtro-tec');
  if(showFiltroTec&&!temFiltroTec){
    var opsTec=meusTecnicos().map(function(t){
      return '<option value="'+t.id+'">'+t.nome.split(' ').slice(0,2).join(' ')+'</option>';
    }).join('');
    toolbarEl.innerHTML=
      '<input id="search-input" placeholder="OS, equipamento, setor..." oninput="render()" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rxs);font-size:13px;background:var(--surface2);font-family:var(--font);"/>'+
      '<select id="filtro-tec" onchange="render()" style="padding:9px 12px;border:1px solid var(--border);border-radius:var(--rxs);font-size:13px;background:var(--surface2);max-width:180px;font-family:var(--font);">'+
      '<option value="">Todos tecnicos</option>'+opsTec+
      '</select>';
  } else if(!showFiltroTec&&(temFiltroTec||!toolbarEl.querySelector('#search-input'))){
    toolbarEl.innerHTML='<input id="search-input" placeholder="OS, equipamento, setor..." oninput="render()" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rxs);font-size:13px;background:var(--surface2);font-family:var(--font);"/>';
  }

  // Aviso de chamados orfaos - aparece acima dos cards na aba Pendentes
  var elContent=document.getElementById('list-content');
  var avisoEl=document.getElementById('aviso-orfaos');
  if(currentRole==='adm'&&currentAnalista&&analistas.length>1&&currentTab==='pendentes'){
    var orfaos=chamados.filter(function(x){ return !x.analistaId&&x.status==='aberto'; });
    if(orfaos.length>0){
      if(!avisoEl){
        avisoEl=document.createElement('div');
        avisoEl.id='aviso-orfaos';
        elContent.parentNode.insertBefore(avisoEl,elContent);
      }
      avisoEl.style.cssText='background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--rxs);padding:12px 16px;margin:0 16px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;';
      avisoEl.innerHTML=
        '<span style="font-size:13px;color:var(--amber);"><strong>'+orfaos.length+' chamado'+(orfaos.length>1?'s':'')+'</strong> sem analista — importados antes dos perfis.</span>'+
        '<button onclick="reivindicarOrfaos()" style="background:var(--amber);color:white;border:none;border-radius:var(--rxs);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);">Atribuir a mim</button>';
    } else if(avisoEl){ avisoEl.remove(); }
  } else if(avisoEl){ avisoEl.remove(); }

  var list=getList();
  var el=document.getElementById('list-content');
  if(!list.length){
    el.innerHTML=`<div class="empty">
      <div class="empty-icon">📋</div>
      <h3>${chamados.length===0?'Nenhum chamado ainda':'Nenhum resultado'}</h3>
      <p>${currentRole==='adm'&&chamados.length===0?'Abra uma OS no Effort e clique em "📤 Enviar OS", ou crie manualmente.':currentRole==='tecnico'?'Nenhum chamado atribuído a você ainda.':'Tente outro filtro.'}</p>
    </div>`;
    return;
  }

  el.innerHTML=list.map(function(c){
    var prio=c.prioridade||'media';
    var titulo=tituloValido(c.titulo)?c.titulo:('OS '+c.effortOS);
    var isAdm=currentRole==='adm';
    var isTec=currentRole==='tecnico';
    var emCot=isCotacao(c);
    var tecPendente=isTec&&isCotacaoTec(c,currentTecnico.id);
    // Botao do tecnico: se em cotacao pendente = "Ver proposta", se atribuido = assumir/encerrar
    var btnTec=gerarBtnTec(c,isTec,tecPendente);
    var btnAdm=gerarBtnAdm(c,isAdm,emCot);
    var btnWhats=isAdm&&c.nomeTecnico&&c.status!=='encerrado'&&!emCot?gerarBtnWhats(c.id):'';
    var chipCot=emCot?'<span class="chip" style="background:#EDE9FE;color:#7C3AED;border-color:#C4B5FD;">Em cotacao</span>':'';
    var chipSemTec=!c.nomeTecnico&&isAdm&&!emCot?'<span class="chip warn">Sem tecnico</span>':'';
    var chipAnalista=''; // cada analista ve so os seus, chip desnecessario
    return '<div class="card">'+
      '<div class="card-stripe '+(emCot?'cotacao':c.status)+'"></div>'+
      '<div class="card-body">'+
        '<div class="card-top">'+
          '<span class="card-os"><span class="prio-dot '+prio+'"></span>'+c.id+'</span>'+
          '<span class="badge '+(emCot?'cotacao':c.status)+'">'+(emCot?'Em cotacao':STATUS[c.status])+'</span>'+
        '</div>'+
        '<div class="card-title">'+trunc(titulo,90)+'</div>'+
        '<div class="card-fields">'+
          (c.equipamento?'<div class="card-field"><span class="cf-label">Equipamento</span><span class="cf-value">'+trunc(c.equipamento,50)+'</span></div>':'')+
          (c.patrimonio?'<div class="card-field"><span class="cf-label">Patrimonio</span><span class="cf-value">'+c.patrimonio+'</span></div>':'')+
          (c.nSerie?'<div class="card-field"><span class="cf-label">N de Serie</span><span class="cf-value">'+c.nSerie+'</span></div>':'')+
          (c.unidade?'<div class="card-field"><span class="cf-label">Setor</span><span class="cf-value">'+trunc(c.unidade,50)+'</span></div>':'')+
          (c.nomeTecnico&&!emCot?'<div class="card-field"><span class="cf-label">Tecnico</span><span class="cf-value">'+trunc(c.nomeTecnico,30)+'</span></div>':'')+
          (c.atendimento?'<div class="card-field"><span class="cf-label">Atendimento</span><span class="cf-value">'+c.atendimento+'</span></div>':'')+
        '</div>'+
        '<div class="card-chips">'+
          (c.abertura?'<span class="chip">'+c.abertura+'</span>':'')+
          chipAnalista+chipSemTec+chipCot+
          (!emCot&&c.valor?'<span class="chip money">'+fmtValor(c.valor)+'</span>':'')+
          (c.dataConserto&&c.status==='encerrado'?'<span class="chip" style="background:var(--green-bg);color:var(--green);border-color:var(--green-bd);">🔧 '+fmtData(c.dataConserto)+'</span>':'')+
          (c.prioridade&&c.prioridade!=='media'?'<span class="chip">'+PRIO[c.prioridade]+'</span>':'')+
          (c.statusChamado?'<span class="chip" style="background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);">'+c.statusChamado+'</span>':'')+
        '</div>'+
        '<div class="card-footer">'+
          gerarBtnVer(c.id)+
          btnAdm+btnWhats+btnTec+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderStatusCfg(){
  document.getElementById('counter').textContent=statusDisponiveis.length;
  var sb=document.getElementById('stat-bar');
  if(sb) sb.innerHTML='';
  var el=document.getElementById('list-content');
  // Secao de analistas no topo
  var htmlAnalistas='<div class="detail-block full-width" style="margin-bottom:14px;">'+
    '<div class="sec">Perfis de analistas</div>'+
    '<p style="font-size:12px;color:var(--text3);margin-bottom:10px;">Gerencie os perfis que aparecem na tela de login.</p>'+
    analistas.map(function(a,i){
      return '<div class="detail-row">'+
        '<span class="cf-value" style="display:flex;align-items:center;gap:8px;">'+
          '<div style="width:28px;height:28px;border-radius:50%;background:var(--or);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">'+a.nome.charAt(0).toUpperCase()+'</div>'+
          a.nome+
        '</span>'+
        '<button class="btn-editar-analista btn ghost" data-idx="'+i+'" style="padding:4px 8px;font-size:11px;flex:0;">✏ Editar</button>'+
      (analistas.length>1?'<button class="btn-remover-analista btn ghost" data-idx="'+i+'" style="padding:4px 8px;font-size:11px;flex:0;">Remover</button>':'')+
      '</div>';
    }).join('')+
    '<div style="display:flex;gap:8px;margin-top:10px;">'+
      '<input id="novo-analista-input" placeholder="Nome do novo analista" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rxs);font-size:13px;background:var(--surface2);font-family:var(--font);"/>'+
      '<button class="btn primary" style="flex:0;padding:9px 14px;" onclick="adicionarAnalista()">+ Adicionar</button>'+
    '</div>'+
  '</div>';
  var html='<div class="detail-block full-width">'+
    '<div class="sec">Status customizados para chamados</div>'+
    '<p style="font-size:12px;color:var(--text3);margin-bottom:12px;">Estes status aparecem como opcao para os tecnicos selecionarem durante o atendimento.</p>'+
    statusDisponiveis.map(function(s,i){
      return '<div class="detail-row">'+
        '<span class="cf-value">'+s+'</span>'+
        '<button class="btn ghost" style="padding:4px 10px;font-size:11px;flex:0;" onclick="removerStatus('+i+')">Remover</button>'+
        '</div>';
    }).join('')+
    '</div>'+
    '<div class="detail-block full-width">'+
    '<div class="sec">Adicionar novo status</div>'+
    '<div style="display:flex;gap:8px;">'+
    '<input id="novo-status-input" placeholder="Ex: Aguardando peca importada" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface2);"/>'+
    '<button class="btn primary" style="flex:0;padding:10px 16px;" onclick="adicionarStatus()">Adicionar</button>'+
    '</div></div>';
  el.innerHTML=htmlAnalistas+html;
  el.querySelectorAll('.btn-editar-analista').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-idx'));
      editarAnalistaInline(idx);
    });
  });
  el.querySelectorAll('.btn-remover-analista').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-idx'));
      excluirAnalista(idx);
    });
  });
}

function editarAnalistaInline(idx){
  var a=analistas[idx];
  if(!a) return;
  var novoNome=prompt('Novo nome para "'+a.nome+'":',a.nome);
  if(!novoNome||!novoNome.trim()) return;
  analistas[idx].nome=novoNome.trim();
  save();renderStatusCfg();toast('Perfil atualizado!');
}

function adicionarAnalista(){
  var inp=document.getElementById('novo-analista-input');
  if(!inp||!inp.value.trim()) return;
  analistas.push({id:'ADM-'+Date.now(),nome:inp.value.trim()});
  save();renderStatusCfg();toast('Analista adicionado!');
}

function excluirAnalista(idx){
  if(analistas.length<=1){
    toast('Nao e possivel remover o unico perfil!');
    return;
  }
  var nome=analistas[idx]?analistas[idx].nome:'este perfil';
  if(!confirm('Excluir o perfil "'+nome+'"? Os chamados atribuidos a ele ficarao sem analista.')) return;
  analistas.splice(idx,1);
  save();renderStatusCfg();toast('Perfil removido!');
}

function renderNotaFiscal(){
  var sb=document.getElementById('stat-bar');
  if(sb) sb.innerHTML='';
  var el=document.getElementById('list-content');
  var encerrados=chamados.filter(function(x){
    return x.tecnicoId===currentTecnico.id && x.status==='encerrado';
  });
  if(!encerrados.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📄</div><h3>Nenhum chamado encerrado</h3><p>Os chamados encerrados aparecem aqui para gerar nota fiscal.</p></div>';
    return;
  }
  // Estado de seleção
  if(!window._notaSel) window._notaSel={};
  var html='<div class="detail-block full-width">'+
    '<div class="sec">Selecione os chamados para nota fiscal</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px;">'+
    '<button class="btn" style="font-size:11px;padding:6px 10px;" onclick="notaSelectAll(true)">Selecionar todos</button>'+
    '<button class="btn" style="font-size:11px;padding:6px 10px;" onclick="notaSelectAll(false)">Desmarcar todos</button>'+
    '<button class="btn primary" style="font-size:11px;padding:6px 10px;" onclick="gerarNota()">Gerar e copiar</button>'+
    '</div>'+
    encerrados.map(function(ch){
      var sel=window._notaSel[ch.id]||false;
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;cursor:pointer;border:1px solid '+(sel?'var(--or)':'var(--border)')+'" onclick="notaToggle(\''+ch.id+'\')">'+
        '<input type="checkbox" '+(sel?'checked':'')+' style="width:16px;height:16px;" onclick="notaToggle(\''+ch.id+'\');event.stopPropagation()"/>'+
        '<div style="flex:1;font-size:12px;">'+
        '<div><strong>'+ch.id+'</strong> - '+(ch.titulo||'').substring(0,50)+'</div>'+
        '<div style="color:var(--text3);">'+(ch.equipamento||'')+' | '+(ch.unidade||'')+'</div>'+
        (ch.valor?'<div style="color:var(--green);font-weight:600;">R$ '+Number(ch.valor).toFixed(2).replace('.',',')+'</div>':'<div style="color:var(--text3);">Sem valor</div>')+
        '</div></div>';
    }).join('')+
    '</div>';
  el.innerHTML=html;
}

function notaToggle(id){
  if(!window._notaSel) window._notaSel={};
  window._notaSel[id]=!window._notaSel[id];
  renderNotaFiscal();
}

function notaSelectAll(sel){
  if(!window._notaSel) window._notaSel={};
  chamados.filter(function(x){
    return x.tecnicoId===currentTecnico.id && x.status==='encerrado';
  }).forEach(function(x){ window._notaSel[x.id]=sel; });
  renderNotaFiscal();
}

function gerarNota(){
  if(!window._notaSel) return;
  var selecionados=chamados.filter(function(x){
    return x.tecnicoId===currentTecnico.id && x.status==='encerrado' && window._notaSel[x.id];
  });
  if(!selecionados.length){ toast('Selecione ao menos um chamado!'); return; }
  var total=0;
  var txt='RELATORIO DE SERVICOS - '+currentTecnico.nome+'\n';
  txt+='==========================================\n\n';
  selecionados.forEach(function(ch,i){
    txt+=(i+1)+'. OS: '+ch.id+'\n';
    if(ch.equipamento) txt+='   Equipamento: '+ch.equipamento+'\n';
    if(ch.unidade) txt+='   Setor: '+ch.unidade+'\n';
    if(ch.nSerie) txt+='   N de Serie: '+ch.nSerie+'\n';
    if(ch.patrimonio) txt+='   Patrimonio: '+ch.patrimonio+'\n';
    if(ch.dataConserto) txt+='   Data conserto: '+fmtData(ch.dataConserto)+'\n';
    if(ch.solucao) txt+='   Servico: '+ch.solucao+'\n';
    var val=ch.valor?Number(ch.valor):0;
    txt+='   Valor: R$ '+val.toFixed(2).replace('.',',')+'\n\n';
    total+=val;
  });
  txt+='==========================================\n';
  txt+='TOTAL: R$ '+total.toFixed(2).replace('.',',')+'\n';
  navigator.clipboard.writeText(txt).then(function(){
    toast('Nota copiada! Cole na nota fiscal.');
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();
    toast('Nota copiada! Cole na nota fiscal.');
  });
}

function adicionarStatus(){
  var inp=document.getElementById('novo-status-input');
  if(!inp||!inp.value.trim()) return;
  statusDisponiveis.push(inp.value.trim());
  save();renderStatusCfg();toast('Status adicionado!');
}

function removerStatus(i){
  statusDisponiveis.splice(i,1);
  save();renderStatusCfg();toast('Status removido!');
}

function renderPorTecnico(){
  document.getElementById('counter').textContent=chamados.length;
  var sb=document.getElementById('stat-bar');
  if(sb) sb.innerHTML='';
  var el=document.getElementById('list-content');
  if(!tecnicos.length){
    el.innerHTML='<div class="empty full-width"><div class="empty-icon">👷</div><h3>Nenhum tecnico</h3></div>';
    return;
  }
  var html='';
  meusTecnicos().forEach(function(tec){
    var chs=chamados.filter(function(x){ return x.tecnicoId===tec.id; });
    if(!chs.length) return;
    var ini=tec.nome.split(' ').slice(0,2).map(function(p){return p[0];}).join('').toUpperCase();
    html+='<div class="tec-card full-width" style="flex-direction:column;align-items:flex-start;gap:8px;">'+
      '<div style="display:flex;align-items:center;gap:10px;width:100%;">'+
      '<div class="tec-av">'+ini+'</div>'+
      '<div class="tec-info"><div class="tec-name">'+tec.nome+'</div>'+
      '<div class="tec-sub">'+chs.length+' chamado'+(chs.length!==1?'s':'')+'</div></div>'+
      '<button class="btn primary" style="padding:6px 12px;font-size:11px;flex:0;" onclick="copiarChamadosTec(\'' + tec.id + '\')">Copiar</button>'+
      '</div>';
    chs.forEach(function(ch){
      html+='<div style="width:100%;background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:12px;">'+
        '<span class="badge '+ch.status+'" style="margin-right:6px;">'+STATUS[ch.status]+'</span>'+
        '<strong>'+(ch.titulo||ch.id).substring(0,60)+'</strong>'+
        (ch.equipamento?'<br>Equip: '+ch.equipamento:'')+
        (ch.unidade?'  |  Setor: '+ch.unidade:'')+
        '<div style="display:flex;gap:4px;margin-top:6px;">'+
        mkBtn('btn','openModal',[ch.id],'Ver')+
        (ch.status!=='encerrado'?mkBtn('btn ghost','openModal',['atrib',ch.id],'Atribuir'):'')+
        (ch.status==='encerrado'?mkBtn('btn-reabrir','reabrirChamado',[ch.id],'Reabrir'):'')+
        '</div></div>';
    });
    html+='</div>';
  });
  if(!html) html='<div class="empty full-width"><div class="empty-icon">📋</div><h3>Nenhum chamado atribuido</h3></div>';
  el.innerHTML=html;
}

function meusTecnicos(){
  if(currentRole==='adm'&&currentAnalista){
    return tecnicos.filter(function(t){return !t.analistaId||t.analistaId===currentAnalista.id;});
  }

}

function enviarWhats(id){
  var c=chamados.find(x=>x.id===id);
  if(!c||!c.tecnicoId){toast('⚠️ Atribua um técnico primeiro.');return;}
  var tec=tecnicos.find(t=>t.id===c.tecnicoId);
  if(!tec||!tec.whatsapp){toast('⚠️ Técnico sem WhatsApp.');return;}
  var titulo=tituloValido(c.titulo)?c.titulo:('OS '+c.effortOS);
  // Link direto com ID do técnico - ao clicar ele já entra nos seus chamados
  var base=window.location.href.split('?')[0].split('#')[0];
  var linkTec=base+'?tec='+encodeURIComponent(tec.id);
  var msg=encodeURIComponent(
    '🔧 *Chamado de Manutenção · '+PRIO[c.prioridade||'media']+'*\n\n'+
    '*OS:* '+c.id+'\n'+
    '*Ocorrência:* '+titulo+'\n'+
    (c.equipamento?'*Equipamento:* '+c.equipamento+'\n':'')+
    (c.patrimonio?'*Patrimônio:* '+c.patrimonio+'\n':'')+
    (c.unidade?'*Setor:* '+c.unidade+'\n':'')+
    (c.abertura?'*Abertura:* '+c.abertura+'\n':'')+
    '\nToque no link para acessar seus chamados:\n'+linkTec
  );
  window.open('https://wa.me/55'+fwNum(tec.whatsapp)+'?text='+msg,'_blank');
}

function renderCotacaoBlock(ch){
  if(!ch.cotacao||!ch.cotacao.length) return '';
  if(currentRole==='tecnico'&&currentTecnico){
    // Tecnico so ve seu proprio status - NAO ve outros tecnicos
    var minhaCot=ch.cotacao.find(function(ct){ return ct.tecId===currentTecnico.id; });
    if(!minhaCot) return '';
    var proposta=minhaCot.proposta;
    return '<div class="detail-block" style="background:var(--amber-bg);border-color:var(--amber-bd);">'+
      '<div class="sec" style="color:var(--amber);">Aguardando aprovacao do analista</div>'+
      '<p style="font-size:13px;color:var(--amber);line-height:1.5;">Sua proposta foi enviada. Voce sera notificado quando for aprovado.</p>'+
      (proposta&&proposta.valor?'<p style="font-size:12px;color:var(--amber);font-weight:600;margin-top:4px;">Seu valor: R$ '+Number(proposta.valor).toFixed(2).replace('.',',')+'</p>':'')+
      (proposta&&proposta.atendimento?'<p style="font-size:12px;color:var(--amber);margin-top:2px;">Atendimento previsto: '+proposta.atendimento+'</p>':'')+
      '</div>';
  }
  // ADM ve todos os tecnicos e propostas
  var pendentes=ch.cotacao.filter(function(ct){ return ct.status==='pendente'; });
  if(!pendentes.length) return '';
  return '<div class="detail-block">'+
    '<div class="sec">Cotacoes pendentes</div>'+
    pendentes.map(function(ct){
      var prop=ct.proposta;
      return '<div class="detail-row" style="padding:8px 0;">'+
        '<div style="flex:1;">'+
          '<span style="font-weight:600;font-size:13px;">'+ct.tecNome.split(' ').slice(0,2).join(' ')+'</span>'+
          (prop?'<span style="font-size:11px;color:var(--text3);margin-left:8px;">R$ '+(prop.valor?Number(prop.valor).toFixed(2).replace('.',','):'--')+(prop.atendimento?' | '+prop.atendimento:'')+'</span>':
            '<span style="font-size:11px;color:var(--text3);margin-left:8px;">Aguardando proposta</span>')+
        '</div>'+
        '<span style="display:flex;gap:6px;">'+
          mkBtn('btn-aprovar','aprovarCotacao',[ch.id,ct.tecId],ICONS.aprovar)+
          mkBtn('btn-reprovar','reprovarCotacao',[ch.id,ct.tecId],ICONS.reprovar)+
        '</span>'+
      '</div>';
    }).join('')+
  '</div>';
}

  document.getElementById('modal-overlay').style.zIndex='9999';
  document.body.style.overflow='hidden';
}

function selPrio(el,prio){
  prioSel=prio;
  document.querySelectorAll('.prio-opt').forEach(x=>{x.className='prio-opt';});
  el.className=`prio-opt sel ${prio}`;
}

function salvarNovo(){
  var titulo=(document.getElementById('f-titulo').value||'').trim();
  if(!titulo){toast('⚠️ Informe a ocorrência.');return;}
  var tecId=document.getElementById('f-tecnico').value;
  var tec=tecnicos.find(t=>t.id===tecId);
  nextId++;
  chamados.unshift({
    id:'MAN-'+String(nextId).padStart(3,'0'),effortOS:null,
    titulo,
    equipamento:document.getElementById('f-equip').value.trim(),
    patrimonio:document.getElementById('f-pat').value.trim(),
    nSerie:document.getElementById('f-serie').value.trim(),
    unidade:document.getElementById('f-unidade').value.trim(),
    modelo:'',fabricante:'',
    tecnicoId:tecId||null,nomeTecnico:tec?tec.nome:'',
    prioridade:prioSel,status:'aberto',
    descricao:document.getElementById('f-desc').value.trim()||titulo,
    abertura:hoje(),atendimento:null,valor:null,
    solucao:'',obs:'',fotos:[],encerramento:null,
    analistaId:currentAnalista?currentAnalista.id:'',
    analistaNome:currentAnalista?currentAnalista.nome:'',
  });
  save();closeModal();render();toast('✅ Chamado criado!');
}

function salvarAtrib(){
  var c=editTarget;
  var tecId=document.getElementById('f-atrib-tec').value;
  var tec=tecnicos.find(t=>t.id===tecId);
  c.tecnicoId=tecId||null;c.nomeTecnico=tec?tec.nome:'';
  save();closeModal();render();toast('👷 Técnico atribuído!');
}

function salvarAtualizar(){
  var ch=editTarget;
  var isEnc=ch.status==='andamento';
  var emCotacaoPendente=currentRole==='tecnico'&&isCotacaoTec(ch,currentTecnico.id);

  // ── MODO COTAÇÃO ──────────────────────────────────────────────
  if(emCotacaoPendente){
    var aEl=document.getElementById('f-atend');
    if(!aEl||!aEl.value){
      toast('Informe a data prevista de atendimento!');
      if(aEl) aEl.style.borderColor='var(--red)';
      return;
    }
    var vProp=parseFloat((document.getElementById('f-valor')||{}).value)||null;
    var aProp=fmtData(aEl.value);
    var oProp=((document.getElementById('f-obs-and')||{}).value||'').trim();
    ch.cotacao.forEach(function(ct){
      if(ct.tecId===currentTecnico.id) ct.proposta={valor:vProp,atendimento:aProp,obs:oProp};
    });
    save();
    closeModal();
    render();
    toast('Proposta enviada! Aguardando aprovacao.');
    return;
  }

  // ── MODO ASSUMIR ──────────────────────────────────────────────
  if(!isEnc){
    var aEl2=document.getElementById('f-atend');
    if(!aEl2||!aEl2.value){
      toast('Informe a data de atendimento!');
      if(aEl2) aEl2.style.borderColor='var(--red)';
      return;
    }
    var obsAnd=document.getElementById('f-obs-and');
    if(obsAnd&&obsAnd.value.trim()) ch.obs=obsAnd.value.trim();
    ch.atendimento=fmtData(aEl2.value);
    ch.status='andamento';
    save();
    closeModal();
    render();
    toast('Chamado assumido!');
    return;
  }

  // ── MODO ENCERRAR ─────────────────────────────────────────────
  var dcEl=document.getElementById('f-data-conserto');
  if(!dcEl||!dcEl.value){
    toast('Informe a data do conserto!');
    if(dcEl) dcEl.style.borderColor='var(--red)';
    return;
  }
  var vEl=document.getElementById('f-valor');
  if(!vEl||!vEl.value||parseFloat(vEl.value)<=0){
    toast('Informe o valor do serviço!');
    if(vEl) vEl.style.borderColor='var(--red)';
    return;
  }
  var stEl=document.getElementById('f-status-chamado');
  var sEl=document.getElementById('f-solucao');
  var oEl=document.getElementById('f-obs');
  ch.dataConserto=dcEl.value;
  ch.valor=parseFloat(vEl.value)||null;
  if(stEl) ch.statusChamado=''; // limpa status ao encerrar
  if(sEl) ch.solucao=sEl.value.trim();
  if(oEl) ch.obs=oEl.value.trim();
  ch.fotos=[...(ch.fotos||[]),...tempFotos];
  ch.encerramento=hoje();
  ch.status='encerrado';
  save();
  closeModal();
  render();
  toast('Chamado encerrado!');
}

function salvarTec(id){
  var nome=(document.getElementById('f-tnome').value||'').trim();
  if(!nome){toast('⚠️ Informe o nome.');return;}
  var whatsapp=(document.getElementById('f-twhats').value||'').replace(/\D/g,'');
  var empresa=(document.getElementById('f-tempresa').value||'').trim();
  if(id&&id!=='null'){
    var t=tecnicos.find(x=>x.id===id);
    if(t){t.nome=nome;t.whatsapp=whatsapp;t.empresa=empresa;}
  } else {
    tecnicos.push({id:'TEC-'+Date.now(),nome:nome,whatsapp:whatsapp,empresa:empresa,
      analistaId:currentAnalista?currentAnalista.id:'',
      analistaNome:currentAnalista?currentAnalista.nome:''});
  }
  save();closeModal();if(currentTab==='tecnicos') renderTecnicos();
  else render();
  toast('✅ Técnico salvo!');
}

function getLinkTec(id) {
  var base = window.location.href.split('?')[0].split('#')[0];
  return base + '?tec=' + encodeURIComponent(id);
}

function copiarLinkTec(id) {
  var tec = tecnicos.find(function(t){ return t.id === id; });
  if (!tec) return;
  var link = getLinkTec(id);
  navigator.clipboard.writeText(link).then(function() {
    toast('🔗 Link de ' + tec.nome.split(' ')[0] + ' copiado!');
  }).catch(function() {
    // Fallback para navegadores sem clipboard API
    var ta = document.createElement('textarea');
    ta.value = link;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('🔗 Link de ' + tec.nome.split(' ')[0] + ' copiado!');
  });
}

function enviarLinkWhats(id) {
  var tec = tecnicos.find(function(t){ return t.id === id; });
  if (!tec) { toast('⚠️ Técnico não encontrado.'); return; }
  if (!tec.whatsapp) { toast('⚠️ Técnico sem WhatsApp cadastrado.'); return; }
  var link = getLinkTec(id);
  var msg = encodeURIComponent(
    'Ola ' + tec.nome.split(' ')[0] + '! ' +
    'Aqui esta seu link de acesso ao sistema de chamados:\n\n' +
    link + '\n\n' +
    'Salve este link - ele abre direto nos seus chamados. ' +
    'Voce pode adicionar a tela inicial do celular para acesso rapido.'
  );
  var num = (tec.whatsapp || '').replace(/\D/g, '');
  window.open('https://wa.me/55' + num + '?text=' + msg, '_blank');
}

function excluirTec(id){
  if(!confirm('Excluir este tecnico?')) return;
  tecnicos=tecnicos.filter(t=>t.id!==id);
  save();renderTecnicos();toast('Removido.');
}

function toggleCotacao(el){

  if(selected){
    el.setAttribute('data-selected','0');
    el.style.border='2px solid var(--border)';
    el.style.background='white';

    el.querySelector('.cotacao-check-box').style.borderColor='var(--border2)';
    el.querySelector('.cotacao-check-box').textContent='';
  } else {
    el.setAttribute('data-selected','1');

function salvarCotacao(chamadoId){
  var ch=chamados.find(function(x){ return x.id===chamadoId; });
  if(!ch) return;
  var items=document.querySelectorAll('.cotacao-item[data-selected="1"]');
  if(!items.length){ toast('Selecione ao menos um tecnico!'); return; }
  ch.cotacao=[];
  items.forEach(function(item){
    var tecId=item.getAttribute('data-id');
    var tec=tecnicos.find(function(t){ return t.id===tecId; });
    if(tec) ch.cotacao.push({tecId:tec.id,tecNome:tec.nome,status:'pendente'});
  });
  ch.tecnicoId=null;
  ch.nomeTecnico='Cotacao: '+ch.cotacao.map(function(x){return x.tecNome.split(' ')[0];}).join(', ');
  save();closeModal();render();
  // WhatsApp para todos - salva lista e abre um de cada vez
  var titulo=tituloValido(ch.titulo)?ch.titulo:('OS '+ch.effortOS);
  var base=window.location.href.split('?')[0].split('#')[0];
  var msgs=[];
  ch.cotacao.forEach(function(ct){
    var tec=tecnicos.find(function(t){ return t.id===ct.tecId; });
    if(!tec||!tec.whatsapp) return;
    var linkTec=base+'?tec='+encodeURIComponent(tec.id);
    msgs.push({
      nome:tec.nome.split(' ')[0],
      num:(tec.whatsapp||'').replace(/\D/g,''),
      msg:encodeURIComponent(
        'Ola '+tec.nome.split(' ')[0]+'!\n\n'+
        'Temos um chamado em cotacao aguardando sua proposta:\n\n'+
        'OS: '+ch.id+'\n'+
        (ch.equipamento?'Equipamento: '+ch.equipamento+'\n':'')+
        (ch.unidade?'Setor: '+ch.unidade+'\n':'')+
        'Ocorrencia: '+titulo+'\n\n'+
        'Acesse o link para ver os detalhes e enviar seu valor:\n'+linkTec
      )
    });
  });
  if(msgs.length){
    // Abre WhatsApp do primeiro imediatamente
    window.open('https://wa.me/55'+msgs[0].num+'?text='+msgs[0].msg,'_blank');
    // Os demais abre com delay para nao bloquear popup
    for(var mi=1;mi<msgs.length;mi++){
      (function(m){
        setTimeout(function(){ window.open('https://wa.me/55'+m.num+'?text='+m.msg,'_blank'); },mi*1500);
      })(msgs[mi]);
    }
  }
  toast('Cotacao enviada! WhatsApp abrindo para '+msgs.length+' tecnicos.');
}

function aprovarCotacao(chamadoId,tecId){
  var ch=chamados.find(function(x){ return x.id===chamadoId; });
  if(!ch||!ch.cotacao) return;
  var tec=tecnicos.find(function(t){ return t.id===tecId; });
  if(!tec) return;
  // Pega proposta do tecnico aprovado se existir
  var ct=ch.cotacao.find(function(x){ return x.tecId===tecId; });
  if(ct&&ct.proposta){
    ch.valor=ct.proposta.valor||ch.valor;
    ch.atendimento=ct.proposta.atendimento||ch.atendimento;
    ch.obs=ct.proposta.obs||ch.obs;
  }
  ch.tecnicoId=tecId;
  ch.nomeTecnico=tec.nome;
  ch._cotacaoOrigem=true; // marca que veio de cotacao
  ch.cotacao=null; // limpa cotacao
  // Chamado vai para status aberto (tecnico aprovado precisa assumir)
  ch.status='aberto';
  save();closeModal();render();toast('Cotacao aprovada! '+tec.nome.split(' ')[0]+' foi atribuido.');
}

function reabrirChamado(id){
  var ch=chamados.find(function(x){ return x.id===id; });
  if(!ch) return;
  if(!confirm('Reabrir este chamado?')) return;
  ch.status='aberto';
  ch.encerramento=null;
  save();closeModal();render();toast('Chamado reaberto!');
}

function excluirChamado(id){
  var ch=chamados.find(function(x){ return x.id===id; });
  if(!ch) return;
  if(!confirm('Excluir permanentemente o chamado '+id+'? Esta acao nao pode ser desfeita.')) return;
  chamados=chamados.filter(function(x){ return x.id!==id; });
  save();closeModal();render();toast('Chamado excluido.');
}

function copiarChamadosTec(tecId){
  var tec=tecnicos.find(function(t){ return t.id===tecId; });
  if(!tec){ toast('Tecnico nao encontrado'); return; }
  var lista=chamados.filter(function(x){ return x.tecnicoId===tecId; });
  if(!lista.length){ toast('Nenhum chamado para este tecnico'); return; }
  var txt='Chamados de '+tec.nome+'\n\n';
  lista.forEach(function(ch,i){
    txt+=(i+1)+' - '+(ch.titulo||ch.id)+'\n';
    if(ch.unidade) txt+='Setor: '+ch.unidade+'\n';
    if(ch.equipamento) txt+='Equipamento: '+ch.equipamento+'\n';
    if(ch.patrimonio) txt+='Patrimonio: '+ch.patrimonio+'\n';
    if(ch.nSerie) txt+='N de Serie: '+ch.nSerie+'\n';
    if(ch.requisitante) txt+='Requisitante: '+ch.requisitante+'\n';
    txt+='Status: '+(ch.status==='aberto'?'Aberto':ch.status==='andamento'?'Em andamento':'Encerrado')+'\n';
    if(ch.solucao) txt+='Solucao: '+ch.solucao+'\n';
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(function(){
    toast('Chamados copiados!');
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();
    toast('Chamados copiados!');
  });
}

function addFotos(e){
  Array.from(e.target.files).forEach(f=>{

    r.onload=ev=>{

      var p=document.getElementById('photo-preview');

// INTEGRAÇÃO EXTENSÃO
// Polling no localStorage a cada 1s - extensão grava aqui
// ---
function verificarNovasOS(){
  try{
    var raw=localStorage.getItem('maint_v5');
    if(!raw||raw===_snap) return;
    var data=JSON.parse(raw);
    var novosArr=data.chamados||[];
    if(!novosArr.length){ _snap=raw; return; }
    var idsAtuais=chamados.map(function(x){return x.id;});
    var novos=novosArr.filter(function(x){return idsAtuais.indexOf(x.id)===-1;});
    if(!novos.length){ _snap=raw; return; }
    // Marca analista nos novos chamados
    novos.forEach(function(ch){
      if(currentAnalista&&!ch.analistaId){
        ch.analistaId=currentAnalista.id;
        ch.analistaNome=currentAnalista.nome;
      }
    });
    chamados=chamados.concat(novos);
    // Remove do localStorage apos processar
    localStorage.removeItem('maint_v5');
    _snap='';
    save();
    render();
    toast('📥 '+novos.length+' nova'+(novos.length>1?'s OS':' OS')+' do Effort!');
  }catch(e){}
}

// Sincronizacao em tempo real - busca atualizacoes do Supabase a cada 15s
function syncSupabase(){
  var agora=Date.now();
  if(agora-_lastSync<8000) return;
  _lastSync=agora;
  supaGet('config','chave=eq.dados')
    .then(function(rows){
      if(!rows||!rows[0]||!rows[0].valor) return;
      var d=rows[0].valor;
      var tsRemoto=d._ts||0;
      // Aplica se versao remota for mais nova que a ultima que recebemos
      if(tsRemoto>_tsServidor){
        _tsServidor=tsRemoto;
        aplicarDados(d,true);
        if(currentRole) render();
      }
    })
    .catch(function(){});
}

// Apenas reseta _snap para que verificarNovasOS detecte mudancas da extensao
_snap = localStorage.getItem('maint_v5') || '';

});

  verificarNovasOS();
  if(currentRole) syncSupabase();
},2000);

function _iniciarSessao(){
  try {
    var sess=sessionStorage.getItem('role_adm');
    var admId=sessionStorage.getItem('analista_id');
    if(sess==='1'){
      currentRole='adm';currentTecnico=null;
      if(admId) currentAnalista=analistas.find(function(x){return x.id===admId;})||null;
      montarApp();return;
    }
    var params=new URLSearchParams(window.location.search);
    var tecId=params.get('tec');
    if(tecId){
      var tec=tecnicos.find(function(t){return t.id===decodeURIComponent(tecId);});
      if(tec){currentRole='tecnico';currentTecnico=tec;montarApp();}
      else{
        document.getElementById('adm-section').style.display='none';
        document.getElementById('login-card-aviso').style.display='block';
      }
    }
  }catch(e){}
}
