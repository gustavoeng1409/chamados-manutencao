<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Chamados · Manutenção</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --or:#E05A1E;--or2:#C44D18;--or3:#F97316;--or-bg:#FFF4EE;--or-border:#FDBA8C;
  --bg:#F2F1ED;--surface:#FFFFFF;--surface2:#F8F7F4;--border:#E4E2DC;--border2:#D0CEC7;
  --text:#18171A;--text2:#5C5A58;--text3:#9B9895;
  --green:#0D7D4D;--green-bg:#ECFDF5;--green-border:#86EFAC;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-border:#93C5FD;
  --amber:#92400E;--amber-bg:#FFFBEB;--amber-border:#FDE68A;
  --red:#B91C1C;
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#tela-login{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  background:var(--bg);
}
.login-wrap{width:100%;max-width:360px;}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;}
.login-icon{width:44px;height:44px;background:var(--or);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.login-icon svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.login-brand-name{font-size:17px;font-weight:700;color:var(--text);}
.login-brand-sub{font-size:12px;color:var(--text3);margin-top:1px;}

.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--shadow-md);}
.login-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.login-sep{border:none;border-top:1px solid var(--border);margin:18px 0;}

.login-row{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface2);cursor:pointer;margin-bottom:8px;
  transition:border-color .15s,transform .1s;
}
.login-row:hover{border-color:var(--border2);background:#F0EEEA;}
.login-row:active{transform:scale(.99);}
.login-row.adm{background:var(--or);border-color:var(--or);color:white;}
.login-row.adm:hover{background:var(--or2);border-color:var(--or2);}
.login-row.dashed{border-style:dashed;background:transparent;}
.lr-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.lr-av.adm-av{background:rgba(255,255,255,.2);color:white;}
.lr-av.tec-av{background:var(--or-bg);color:var(--or);}
.lr-av.add-av{background:var(--bg);color:var(--text3);font-size:20px;}
.lr-text{flex:1;}
.lr-name{font-size:14px;font-weight:600;}
.lr-sub{font-size:11px;opacity:.7;margin-top:1px;}
.lr-arrow{font-size:14px;opacity:.4;}

/* ══════════════════════════════════════
   APP
══════════════════════════════════════ */
#tela-app{display:none;max-width:480px;margin:0 auto;min-height:100vh;position:relative;}

/* Topbar */
.topbar{
  background:var(--or);color:white;padding:0 16px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-avatar{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.tb-info{}
.tb-role{font-size:10px;opacity:.75;font-weight:600;letter-spacing:.05em;text-transform:uppercase;line-height:1;}
.tb-name{font-size:15px;font-weight:700;line-height:1.3;}
.tb-right{display:flex;align-items:center;gap:6px;}
.tb-pill{background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.tb-exit{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:500;}

/* Tabs */
.tabs{background:var(--surface);display:flex;border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:40;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;min-width:72px;transition:color .15s;}
.tab.active{color:var(--or);border-bottom-color:var(--or);font-weight:700;}

/* Toolbar */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center;}
.toolbar input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--surface2);font-family:var(--font);color:var(--text);}
.toolbar input:focus{outline:none;border-color:var(--or-border);background:white;}
.tb-btn{padding:9px 14px;background:var(--or);color:white;border:none;border-radius:var(--radius-xs);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:background .12s;}
.tb-btn:hover{background:var(--or2);}
.tb-btn.sec{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

/* Content */
.content{padding:12px 12px 90px;}

/* ── CARDS ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:0;margin-bottom:10px;
  box-shadow:var(--shadow);overflow:hidden;
  transition:transform .1s,box-shadow .1s;
}
.card:active{transform:scale(.995);box-shadow:none;}

/* Barra de cor lateral por status */
.card-inner{display:flex;}
.card-stripe{width:4px;flex-shrink:0;}
.card-stripe.aberto{background:var(--amber-border);}
.card-stripe.andamento{background:var(--blue-border);}
.card-stripe.encerrado{background:var(--green-border);}

.card-body{flex:1;padding:13px 14px;}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.card-os{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.03em;}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.02em;}
.badge.aberto{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge.andamento{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.badge.encerrado{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}

.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:6px;}

.card-info{display:flex;flex-direction:column;gap:2px;margin-bottom:10px;}
.card-info-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.card-info-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}

.card-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.chip{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-weight:500;}
.chip.warn{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.chip.money{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}

.card-footer{display:flex;gap:6px;border-top:1px solid var(--border);padding-top:10px;}
.btn{flex:1;padding:9px 6px;border-radius:var(--radius-xs);border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:var(--font);transition:background .1s,border-color .1s;}
.btn:hover{background:var(--surface2);}
.btn.primary{background:var(--or);color:white;border-color:var(--or);}
.btn.primary:hover{background:var(--or2);}
.btn.success{background:var(--green);color:white;border-color:var(--green);}
.btn.whats{background:#25D366;color:white;border-color:#25D366;}
.btn.danger{color:var(--red);border-color:#FCA5A5;}
.btn:active{opacity:.75;}

/* FAB */
.fab{
  position:fixed;bottom:24px;right:calc(50% - 228px);
  width:52px;height:52px;border-radius:50%;
  background:var(--or);color:white;font-size:22px;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(224,90,30,.45);z-index:30;
  transition:transform .15s,background .1s;
}
.fab:hover{transform:scale(1.06);background:var(--or2);}
@media(max-width:480px){.fab{right:14px;}}

/* Empty */
.empty{text-align:center;padding:56px 24px;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty h3{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.empty p{font-size:13px;color:var(--text3);line-height:1.5;}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(2px);}
.modal{
  background:var(--surface);border-radius:22px 22px 0 0;
  padding:20px 16px 40px;width:100%;max-width:480px;margin:0 auto;
  max-height:92vh;overflow-y:auto;
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:16px;font-weight:700;}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--text3);display:flex;align-items:center;justify-content:center;}

/* Campos */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field textarea,.field select{
  width:100%;padding:11px 13px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface2);
  font-size:14px;color:var(--text);font-family:var(--font);-webkit-appearance:none;
}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--or-border);background:white;}
.field textarea{min-height:78px;resize:vertical;line-height:1.5;}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px;}

/* Detail modal */
.detail-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;margin-bottom:12px;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row:last-child{border-bottom:none;padding-bottom:0;}
.dl{color:var(--text3);flex-shrink:0;padding-right:10px;font-size:12px;font-weight:500;}
.dv{font-weight:600;color:var(--text);text-align:right;max-width:62%;word-break:break-word;}
.sec-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}

/* Photos */
.photo-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.photo-thumb{width:74px;height:74px;border-radius:var(--radius-xs);object-fit:cover;border:1px solid var(--border);cursor:pointer;}
.photo-add-btn{width:74px;height:74px;border-radius:var(--radius-xs);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;color:var(--text3);cursor:pointer;background:var(--surface2);gap:2px;}
.photo-add-btn span{font-size:9px;font-weight:600;color:var(--text3);}

/* Técnicos */
.tec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.tec-av{width:42px;height:42px;border-radius:50%;background:var(--or-bg);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--or);flex-shrink:0;}
.tec-info{flex:1;}
.tec-name{font-size:14px;font-weight:600;}
.tec-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.tec-acts{display:flex;gap:5px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* Toast */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-4px);background:var(--text);color:white;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:400;white-space:nowrap;max-width:94vw;text-align:center;box-shadow:var(--shadow-md);pointer-events:none;animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* Stat bar (ADM) */
.stat-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;}
.stat{flex:1;padding:10px 0;text-align:center;}
.stat-num{font-size:20px;font-weight:700;line-height:1;}
.stat-num.or{color:var(--or);}
.stat-num.bl{color:var(--blue);}
.stat-num.gr{color:var(--green);}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.stat+.stat{border-left:1px solid var(--border);}

/* Urgência */
.urgency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.urgency-dot.alta{background:#EF4444;}
.urgency-dot.media{background:#F59E0B;}
.urgency-dot.baixa{background:#10B981;}

/* Prioridade selector */
.prio-row{display:flex;gap:8px;}
.prio-opt{flex:1;padding:9px 4px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s;color:var(--text2);}
.prio-opt.selected.alta{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A5;}
.prio-opt.selected.media{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.prio-opt.selected.baixa{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}

/* Linha divisória no modal */
.modal-sep{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* Info banner */
.info-banner{background:var(--or-bg);border:1px solid var(--or-border);border-radius:var(--radius-xs);padding:10px 13px;margin-bottom:14px;font-size:13px;color:var(--or2);line-height:1.5;}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN
═══════════════════════════════════════ -->
<div id="tela-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div>
        <div class="login-brand-name">Chamados</div>
        <div class="login-brand-sub">Manutenção Industrial</div>
      </div>
    </div>

    <div class="login-card">
      <div class="login-section-label">Analista</div>
      <div class="login-row adm" onclick="entrarAdm()">
        <div class="lr-av adm-av">⚙️</div>
        <div class="lr-text">
          <div class="lr-name">Entrar como Analista</div>
          <div class="lr-sub">Acesso completo ao sistema</div>
        </div>
        <div class="lr-arrow">›</div>
      </div>

      <div class="login-sep"></div>

      <div class="login-section-label">Técnicos terceiros</div>
      <div id="login-tec-list"></div>
      <div class="login-row dashed" onclick="openModal('form-tec',null,true)">
        <div class="lr-av add-av">+</div>
        <div class="lr-text" style="color:var(--text3);">
          <div class="lr-name" style="font-weight:500;">Meu nome não aparece</div>
          <div class="lr-sub">Solicite ao analista ou cadastre-se</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     APP
═══════════════════════════════════════ -->
<div id="tela-app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-avatar" id="tb-av">A</div>
      <div class="tb-info">
        <div class="tb-role" id="tb-role">Analista</div>
        <div class="tb-name" id="tb-name">Chamados</div>
      </div>
    </div>
    <div class="tb-right">
      <span class="tb-pill" id="counter-badge">0</span>
      <button class="tb-exit" onclick="sair()">Sair</button>
    </div>
  </div>

  <div id="stat-bar-wrap"></div>
  <div class="tabs" id="tabs-bar"></div>
  <div class="toolbar" id="toolbar-bar"></div>
  <div class="content" id="list-content"></div>
  <button class="fab" id="fab-btn" style="display:none;" onclick="openModal('novo-chamado')">+</button>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ═══════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════
let chamados=[], tecnicos=[], nextId=1;
let currentTab='todos', currentRole=null, currentTecnico=null;
let editTarget=null, tempFotos=[], prioSel='media';

// ═══════════════════════════════════════
// PERSISTÊNCIA
// ═══════════════════════════════════════
function save(){ try{localStorage.setItem('maint_v4',JSON.stringify({chamados,tecnicos,nextId}));}catch(e){} }
function load(){
  try{
    const r=localStorage.getItem('maint_v4');
    if(r){const d=JSON.parse(r);chamados=d.chamados||[];tecnicos=d.tecnicos||[];nextId=d.nextId||1;}
  }catch(e){}
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
const pad=n=>String(n).padStart(2,'0');
const hoje=()=>{const d=new Date();return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();};
const fmtData=iso=>{if(!iso)return'';const d=new Date(iso+'T12:00:00');return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();};
const fmtValor=v=>v?'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—';
const trunc=(s,n)=>s&&s.length>n?s.slice(0,n)+'…':(s||'');
const iniciais=n=>(n||'?').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
const fwNum=t=>(t||'').replace(/\D/g,'');

const PRIO_LABEL={alta:'🔴 Alta',media:'🟡 Média',baixa:'🟢 Baixa'};
const PRIO_DOT={alta:'alta',media:'media',baixa:'baixa'};
const STATUS_LABEL={aberto:'Aberto',andamento:'Em andamento',encerrado:'Encerrado'};

function toast(msg,dur=3200){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),dur);
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
function renderLoginTecs(){
  const el=document.getElementById('login-tec-list');
  el.innerHTML=tecnicos.map(t=>`
    <div class="login-row" onclick="entrarTec('${t.id}')">
      <div class="lr-av tec-av">${iniciais(t.nome)}</div>
      <div class="lr-text">
        <div class="lr-name">${t.nome}</div>
        <div class="lr-sub">${t.empresa||t.whatsapp||'Técnico terceiro'}</div>
      </div>
      <div class="lr-arrow">›</div>
    </div>`).join('');
}

function entrarAdm(){ currentRole='adm'; currentTecnico=null; mostrarApp(); }
function entrarTec(id){
  currentRole='tecnico'; currentTecnico=tecnicos.find(t=>t.id===id);
  if(!currentTecnico){toast('Técnico não encontrado.');return;}
  mostrarApp();
}
function sair(){
  currentRole=null; currentTecnico=null; currentTab='todos';
  document.getElementById('tela-login').style.display='flex';
  document.getElementById('tela-app').style.display='none';
  renderLoginTecs();
}

// ═══════════════════════════════════════
// MONTAR APP
// ═══════════════════════════════════════
function mostrarApp(){
  document.getElementById('tela-login').style.display='none';
  document.getElementById('tela-app').style.display='block';

// TABS
// ═══════════════════════════════════════
function setTab(el,t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getList(){
  const q=((document.getElementById('search-input')||{}).value||'').toLowerCase();
  let list=[...chamados];
  if(currentRole==='tecnico'){
    list=list.filter(c=>c.tecnicoId===currentTecnico.id);
    if(currentTab==='and-tec') list=list.filter(c=>c.status==='andamento');
    else if(currentTab==='enc-tec') list=list.filter(c=>c.status==='encerrado');
  } else {
    if(currentTab==='aberto') list=list.filter(c=>c.status==='aberto');
    else if(currentTab==='andamento') list=list.filter(c=>c.status==='andamento');
    else if(currentTab==='encerrado') list=list.filter(c=>c.status==='encerrado');
  }
  if(q) list=list.filter(c=>
    (c.id||'').toLowerCase().includes(q)||
    (c.titulo||'').toLowerCase().includes(q)||
    (c.unidade||'').toLowerCase().includes(q)||
    (c.nomeTecnico||'').toLowerCase().includes(q)||
    (c.equipamento||'').toLowerCase().includes(q)
  );
  // Ordena: prioridade alta primeiro, depois por data desc
  list.sort((a,b)=>{
    const po={alta:0,media:1,baixa:2};
    const pa=po[a.prioridade||'media'],pb=po[b.prioridade||'media'];
    if(pa!==pb) return pa-pb;
    return 0;
  });
  return list;
}

    const an=chamados.filter(c=>c.status==='andamento').length;

      <div class="stat"><div class="stat-num or">${ab}</div><div class="stat-label">Abertos</div></div>

      <div class="stat"><div class="stat-num gr">${en}</div><div class="stat-label">Encerrados</div></div>`;

  const total=chamados.filter(c=>c.status!=='encerrado').length;

            <div class="card-info-row"><span class="card-info-icon">📍</span>${trunc(c.unidade,45)}</div>
            ${c.nomeTecnico?`<div class="card-info-row"><span class="card-info-icon">👷</span>${trunc(c.nomeTecnico,30)}</div>`:''}

            ${c.valor?`<span class="chip money">💰 ${fmtValor(c.valor)}</span>`:''}

            ${isAdm&&c.nomeTecnico&&c.status!=='encerrado'?`<button class="btn whats" onclick="enviarWhats('${c.id}')">WhatsApp</button>`:''}
            ${isTec&&c.status!=='encerrado'?`<button class="btn ${c.status==='aberto'?'primary':'success'}" onclick="openModal('atualizar','${c.id}')">${c.status==='aberto'?'✅ Assumir':'🔒 Encerrar'}</button>`:''}

function enviarWhats(id){
  const c=chamados.find(x=>x.id===id);
  if(!c||!c.tecnicoId){toast('⚠️ Atribua um técnico primeiro.');return;}
  const tec=tecnicos.find(t=>t.id===c.tecnicoId);
  if(!tec||!tec.whatsapp){toast('⚠️ Técnico sem número de WhatsApp.');return;}
  const link=window.location.href.split('?')[0];
  const prio=PRIO_LABEL[c.prioridade||'media'];
  const msg=encodeURIComponent(
    `🔧 *Chamado de Manutenção · ${prio}*\n\n`+
    `*OS:* ${c.id}\n`+
    `*Ocorrência:* ${c.titulo}\n`+
    (c.equipamento?`*Equipamento:* ${c.equipamento}\n`:'')+
    `*Setor:* ${c.unidade}\n`+
    `*Abertura:* ${c.abertura}\n\n`+
    `Acesse o sistema para ver os detalhes e atualizar o chamado:\n${link}`
  );
  window.open(`https://wa.me/55${fwNum(tec.whatsapp)}?text=${msg}`,'_blank');
}

function salvarNovoChamado(){
  const titulo=(document.getElementById('f-titulo').value||'').trim();
  if(!titulo){toast('⚠️ Informe a ocorrência.');return;}
  const tecId=document.getElementById('f-tecnico').value;
  const tec=tecnicos.find(t=>t.id===tecId);
  nextId++;
  chamados.unshift({
    id:'MAN-'+String(nextId).padStart(3,'0'),effortOS:null,
    titulo,unidade:document.getElementById('f-unidade').value||'—',
    equipamento:document.getElementById('f-equip').value||'',
    modelo:'',fabricante:'',nSerie:'',
    tecnicoId:tecId||null,nomeTecnico:tec?tec.nome:'',
    prioridade:prioSel,
    status:'aberto',descricao:document.getElementById('f-desc').value||titulo,
    abertura:hoje(),atendimento:null,valor:null,fotos:[],encerramento:null,obs:'',
  });
  save();closeModal();render();toast('✅ Chamado aberto!');
}

function salvarAtrib(){
  const c=editTarget;
  const tecId=document.getElementById('f-atrib-tec').value;
  const tec=tecnicos.find(t=>t.id===tecId);
  c.tecnicoId=tecId||null; c.nomeTecnico=tec?tec.nome:'';
  save();closeModal();render();toast('👷 Técnico atribuído!');
}

function salvarAtualizar(){
  const c=editTarget;
  const isEnc=c.status==='andamento';
  const vEl=document.getElementById('f-valor');
  if(vEl&&vEl.value) c.valor=parseFloat(vEl.value)||null;
  if(!isEnc){
    const aEl=document.getElementById('f-atend');
    if(aEl&&aEl.value) c.atendimento=fmtData(aEl.value);
    c.status='andamento';toast('✅ Chamado assumido!');
  } else {
    const solEl=document.getElementById('f-solucao');
    const obsEl=document.getElementById('f-obs');
    if(solEl&&solEl.value.trim()) c.solucao=solEl.value.trim();
    if(obsEl&&obsEl.value.trim()) c.obs=obsEl.value.trim();
    c.fotos=[...(c.fotos||[]),...tempFotos];
    c.encerramento=hoje();c.status='encerrado';toast('🔒 Chamado encerrado!');
  }
  save();closeModal();render();
}

function salvarTec(id){
  const nome=(document.getElementById('f-tnome').value||'').trim();
  if(!nome){toast('⚠️ Informe o nome.');return;}
  const whatsapp=(document.getElementById('f-twhats').value||'').replace(/\D/g,'');
  const empresa=(document.getElementById('f-tempresa').value||'').trim();
  if(id&&id!=='null'){
    const t=tecnicos.find(x=>x.id===id);
    if(t){t.nome=nome;t.whatsapp=whatsapp;t.empresa=empresa;}
  } else {
    tecnicos.push({id:'TEC-'+Date.now(),nome,whatsapp,empresa});
  }
  save();closeModal();renderLoginTecs();
  if(currentTab==='tecnicos') renderTecnicos();
  else render();
  toast('✅ Técnico salvo!');
}

function excluirTec(id){
  if(!confirm('Excluir este técnico?')) return;
  tecnicos=tecnicos.filter(t=>t.id!==id);
  save();renderTecnicos();toast('🗑 Técnico removido.');
}



// ═══════════════════════════════════════
// FOTOS
// ═══════════════════════════════════════
function addFotos(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      tempFotos.push(ev.target.result);
      const p=document.getElementById('photo-preview');
      if(p){const img=document.createElement('img');img.src=ev.target.result;img.className='photo-thumb';p.appendChild(img);}
    };
    r.readAsDataURL(f);
  });
}
function verFoto(src){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML=`<img src="${src}" style="max-width:95%;max-height:90vh;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);"/>
    <button onclick="this.parentNode.remove()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:white;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;backdrop-filter:blur(4px);">✕</button>`;
  document.body.appendChild(ov);
}

// ═══════════════════════════════════════
// MODAL UTILS
// ═══════════════════════════════════════
function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
  document.body.style.overflow='';tempFotos=[];
}
function closeModalOutside(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}

// ═══════════════════════════════════════
// INTEGRAÇÃO EXTENSÃO
// A extensão injeta direto no localStorage via executeScript
// O sistema detecta mudanças comparando snapshots a cada 1s
// ═══════════════════════════════════════
var _snap = '';

function syncSnapshot() {
  try {
    var raw = localStorage.getItem('maint_v4');
    _snap = raw || '';
  } catch(e) {}
}

function verificarNovasOS() {
  try {
    var raw = localStorage.getItem('maint_v4');
    if (!raw || raw === _snap) return;
    // Mudou! Descobre quais são novas
    var data = JSON.parse(raw);
    var idsAtuais = chamados.map(function(c){ return c.id; });
    var novos = (data.chamados || []).filter(function(c){
      return idsAtuais.indexOf(c.id) === -1;
    });
    // Atualiza estado
    chamados = data.chamados || [];
    tecnicos = data.tecnicos || tecnicos;
    nextId = data.nextId || nextId;
    _snap = raw;
    if (novos.length > 0 && currentRole) {
      render();
      toast('📥 ' + novos.length + ' nova' + (novos.length > 1 ? 's OS recebidas' : ' OS recebida') + ' do Effort!');
    }
  } catch(e) {}
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
load();
renderLoginTecs();
syncSnapshot();
setInterval(verificarNovasOS, 1000);
</script>
